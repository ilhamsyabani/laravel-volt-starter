name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, gd
          coverage: xdebug

      - name: Setup Composer
        uses: php-actions/composer@v6
        with:
          args: --no-interaction --prefer-dist

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Execute tests
        run: ./vendor/bin/pest --colors=never

      - name: Run Pint (Style Check)
        run: ./vendor/bin/pint --test --colors=never

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install Pint
        run: composer global require laravel/pint

      - name: Run Pint
        run: pint --test

  phpstan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite

      - name: Install dependencies
        run: composer install --no-progress --prefer-dist

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=1G --no-progress
        continue-on-error: true