name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Laravel 11 — PHP 8.2, 8.3, 8.4
          - php: '8.2'
            laravel: '11.*'
          - php: '8.3'
            laravel: '11.*'
          - php: '8.4'
            laravel: '11.*'
          # Laravel 12 — PHP 8.2, 8.3, 8.4
          - php: '8.2'
            laravel: '12.*'
          - php: '8.3'
            laravel: '12.*'
          - php: '8.4'
            laravel: '12.*'
          # Laravel 13 — PHP 8.3, 8.4 only (requires ^8.3)
          - php: '8.3'
            laravel: '13.*'
          - php: '8.4'
            laravel: '13.*'

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v3
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Install dependencies (Laravel 11 & 12)
        if: ${{ !startsWith(matrix.laravel, '13') }}
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --prefer-stable

      - name: Install dependencies (Laravel 13 — without pest-plugin-laravel)
        if: ${{ startsWith(matrix.laravel, '13') }}
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer remove pestphp/pest-plugin-laravel --no-interaction --no-update --dev
          composer update --prefer-dist --no-interaction --prefer-stable

      - name: Run tests
        run: ./vendor/bin/pest --no-coverage
